<svg width="100%" height="100%" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Vehicle branding concept A — minimal decal</title>
<desc>Side profile of a white double-cab bakkie with a minimal decal treatment: small door logo, a single oxide accent stripe along the lower body, and a tailgate wordmark. Mostly white bodywork remains visible.</desc>
<rect width="760" height="380" fill="#F2EFE9"/>
<text x="40" y="40" font-family="IBM Plex Mono, monospace" font-size="13" fill="#3D4A47" letter-spacing="1">CONCEPT A — MINIMAL DECAL</text>
<line x1="0" y1="300" x2="760" y2="300" stroke="#C9C2B4" stroke-width="1"/>

<g transform="translate(140,90)">
  <path d="M0 180
           L0 120
           L36 120
           L60 58
           Q66 44 84 44
           L300 44
           Q316 44 322 60
           L342 120
           L470 120
           L470 180
           Z"
        fill="#FFFFFF" stroke="#1C1B19" stroke-width="2"/>
  <path d="M82 115 L100 60 Q104 50 116 50 L268 50 Q280 50 285 62 L300 115 Z"
        fill="#1C1B19" opacity="0.88"/>
  <line x1="192" y1="51" x2="192" y2="115" stroke="#1C1B19" stroke-width="1" opacity="0.4"/>

  <rect x="342" y="92" width="128" height="64" fill="#FFFFFF" stroke="#1C1B19" stroke-width="1.5"/>

  <rect x="0" y="172" width="470" height="14" fill="#B5472B"/>

  <g transform="translate(150,148)">
    <text x="0" y="0" font-family="Oswald, sans-serif" font-size="15" font-weight="700" fill="#1C1B19" letter-spacing="0.5">NOVELLO <tspan fill="#B5472B">STONE</tspan></text>
    <text x="0" y="15" font-family="IBM Plex Mono, monospace" font-size="8" fill="#54635F" letter-spacing="1">FABRICATION · TILING · RESTORATION</text>
  </g>

  <text x="380" y="130" font-family="Oswald, sans-serif" font-size="12" font-weight="600" fill="#1C1B19" letter-spacing="0.5" text-anchor="middle">NOVELLO</text>
  <text x="380" y="144" font-family="IBM Plex Mono, monospace" font-size="7" fill="#54635F" text-anchor="middle">082 000 0000</text>

  <circle cx="58" cy="184" r="28" fill="#1C1B19" stroke="#54635F" stroke-width="1.5"/>
  <circle cx="58" cy="184" r="12" fill="#3D4A47"/>
  <circle cx="412" cy="184" r="28" fill="#1C1B19" stroke="#54635F" stroke-width="1.5"/>
  <circle cx="412" cy="184" r="12" fill="#3D4A47"/>
</g>

<text x="40" y="335" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8A7A66" letter-spacing="0.5">Door logo + tailgate wordmark + single oxide stripe</text>
<text x="40" y="352" font-family="IBM Plex Mono, monospace" font-size="11" fill="#54635F" letter-spacing="0.5">Lowest cost · fastest install · most resale-neutral</text>
</svg>
