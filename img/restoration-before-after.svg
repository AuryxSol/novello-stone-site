<svg width="100%" height="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
<title>Illustrated before and after stone restoration comparison</title>
<desc>Side-by-side illustrated panels showing a dull, etched, and chipped stone surface on the left labelled Before, and the same surface restored to a clean polished finish on the right labelled After. Illustration only, not a photograph.</desc>
<rect width="680" height="420" fill="#1C1B19"/>

<rect x="40" y="50" width="280" height="280" fill="#2A2825" stroke="#C9C2B4" stroke-width="0.5"/>
<g opacity="0.5">
  <path d="M 60 90 Q 120 100 90 140 Q 150 150 110 190 Q 180 195 150 240" fill="none" stroke="#54635F" stroke-width="1"/>
  <path d="M 200 80 Q 230 110 210 150 Q 260 160 240 210" fill="none" stroke="#54635F" stroke-width="0.7"/>
  <circle cx="260" cy="110" r="4" fill="none" stroke="#3D4A47" stroke-width="0.7"/>
  <circle cx="90" cy="250" r="3" fill="none" stroke="#3D4A47" stroke-width="0.7"/>
</g>
<path d="M 230 250 L 260 240 L 255 280 L 270 295 L 235 300 Z" fill="#1C1B19" stroke="#54635F" stroke-width="0.75"/>
<g stroke="#54635F" stroke-width="0.4" opacity="0.4">
  <line x1="60" y1="70" x2="300" y2="70"/>
  <line x1="60" y1="310" x2="300" y2="310"/>
  <line x1="60" y1="70" x2="60" y2="310"/>
  <line x1="300" y1="70" x2="300" y2="310"/>
</g>
<rect x="50" y="60" width="260" height="260" fill="none" stroke="#3D4A47" stroke-width="0.5" opacity="0.3"/>
<rect x="40" y="50" width="280" height="280" fill="#8A7A66" opacity="0.06"/>

<rect x="360" y="50" width="280" height="280" fill="#2A2825" stroke="#C9C2B4" stroke-width="0.5"/>
<rect x="380" y="70" width="240" height="240" fill="#F2EFE9" opacity="0.92"/>
<g stroke="#FFFFFF" stroke-width="3" opacity="0.5">
  <line x1="420" y1="90" x2="460" y2="130"/>
  <line x1="520" y1="100" x2="560" y2="150"/>
  <line x1="440" y1="220" x2="480" y2="260"/>
</g>
<rect x="380" y="70" width="240" height="240" fill="none" stroke="#C9C2B4" stroke-width="0.5"/>

<text x="40" y="345" font-family="IBM Plex Mono, monospace" font-size="13" fill="#B5472B" letter-spacing="1.5">BEFORE</text>
<text x="40" y="362" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8A7A66" letter-spacing="0.5">DULL, ETCHED, CHIPPED EDGE</text>

<text x="360" y="345" font-family="IBM Plex Mono, monospace" font-size="13" fill="#B5472B" letter-spacing="1.5">AFTER</text>
<text x="360" y="362" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8A7A66" letter-spacing="0.5">GROUND, POLISHED, SEALED</text>

<line x1="330" y1="60" x2="330" y2="320" stroke="#C9C2B4" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.4"/>

<text x="40" y="400" font-family="IBM Plex Mono, monospace" font-size="10" fill="#54635F" letter-spacing="0.5">ILLUSTRATIVE — ACTUAL JOB PHOTOS TO BE ADDED</text>
</svg>
