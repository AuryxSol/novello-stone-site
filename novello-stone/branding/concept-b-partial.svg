<svg width="100%" height="100%" viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Vehicle branding concept B — partial wrap</title>
<desc>Side profile of a white double-cab bakkie with a bold partial wrap: the lower half of the body wrapped in basalt black with an oxide accent wedge, door logo, a tailgate wordmark panel, and a QR code linking to the contact page.</desc>
<rect width="760" height="380" fill="#F2EFE9"/>
<text x="40" y="40" font-family="IBM Plex Mono, monospace" font-size="13" fill="#3D4A47" letter-spacing="1">CONCEPT B — PARTIAL WRAP</text>
<line x1="0" y1="300" x2="760" y2="300" stroke="#C9C2B4" stroke-width="1"/>

<g transform="translate(140,90)">
  <path d="M0 180 L0 120 L36 120 L60 58 Q66 44 84 44 L300 44 Q316 44 322 60 L342 120 L470 120 L470 180 Z"
        fill="#FFFFFF" stroke="#1C1B19" stroke-width="2"/>
  <path d="M82 115 L100 60 Q104 50 116 50 L268 50 Q280 50 285 62 L300 115 Z"
        fill="#1C1B19" opacity="0.88"/>
  <line x1="192" y1="51" x2="192" y2="115" stroke="#1C1B19" stroke-width="1" opacity="0.4"/>

  <rect x="360" y="48" width="92" height="68" fill="#FFFFFF" stroke="#1C1B19" stroke-width="1.5"/>
  <text x="406" y="60" font-family="IBM Plex Mono, monospace" font-size="6.5" fill="#1C1B19" text-anchor="middle" letter-spacing="0.5">SCAN FOR A QUOTE</text>
  <image href="data:image/png;base64," x="378" y="64" width="56" height="56"/>

  <path d="M0 130 L470 130 L470 180 L0 180 Z" fill="#1C1B19"/>
  <path d="M0 130 L160 130 L120 180 L0 180 Z" fill="#B5472B"/>

  <g transform="translate(190,158)">
    <text x="0" y="0" font-family="Oswald, sans-serif" font-size="17" font-weight="700" fill="#F2EFE9" letter-spacing="0.5">NOVELLO <tspan fill="#B5472B">STONE</tspan></text>
    <text x="0" y="16" font-family="IBM Plex Mono, monospace" font-size="8" fill="#8A7A66" letter-spacing="1">FABRICATION · TILING · RESTORATION</text>
  </g>

  <circle cx="58" cy="184" r="28" fill="#1C1B19" stroke="#54635F" stroke-width="1.5"/>
  <circle cx="58" cy="184" r="12" fill="#3D4A47"/>
  <circle cx="412" cy="184" r="28" fill="#1C1B19" stroke="#54635F" stroke-width="1.5"/>
  <circle cx="412" cy="184" r="12" fill="#3D4A47"/>
</g>

<text x="40" y="335" font-family="IBM Plex Mono, monospace" font-size="11" fill="#8A7A66" letter-spacing="0.5">Lower-body wrap block + oxide wedge + bold tailgate panel + QR code</text>
<text x="40" y="352" font-family="IBM Plex Mono, monospace" font-size="11" fill="#54635F" letter-spacing="0.5">More visible from a distance · moderate cost · roof stays white</text>
</svg>
