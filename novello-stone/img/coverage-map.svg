<svg width="100%" height="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
<title>Garden Route coverage map, Mossel Bay to George</title>
<desc>Stylised line-art map showing the Garden Route corridor towns served by Novello Stone, from Mossel Bay through Hartenbos, Dana Bay, Groot Brak and Klein Brak to George, connected along a coastal route line.</desc>
<rect width="680" height="520" fill="#1C1B19"/>
<path d="M 0 380 Q 120 360 220 390 Q 340 420 460 380 Q 560 350 680 370 L 680 520 L 0 520 Z" fill="#3D4A47" opacity="0.18"/>
<path d="M 60 280 Q 160 260 260 270 Q 380 282 480 250 Q 580 222 620 200"
      fill="none" stroke="#8A7A66" stroke-width="1.5" stroke-dasharray="6 6"/>

<g>
  <circle cx="60" cy="280" r="7" fill="#B5472B"/>
  <circle cx="60" cy="280" r="14" fill="none" stroke="#B5472B" stroke-width="0.5" opacity="0.5"/>
  <text x="78" y="276" font-family="IBM Plex Mono, monospace" font-size="13" fill="#F2EFE9">Mossel Bay</text>
  <text x="78" y="292" font-family="IBM Plex Mono, monospace" font-size="10" fill="#8A7A66">Home base</text>
</g>

<g>
  <circle cx="170" cy="266" r="5" fill="#C9C2B4"/>
  <text x="184" y="262" font-family="IBM Plex Mono, monospace" font-size="12" fill="#C9C2B4">Hartenbos</text>
</g>

<g>
  <circle cx="120" cy="320" r="5" fill="#C9C2B4"/>
  <text x="60" y="345" font-family="IBM Plex Mono, monospace" font-size="12" fill="#C9C2B4">Dana Bay</text>
  <line x1="120" y1="320" x2="110" y2="338" stroke="#C9C2B4" stroke-width="0.5" opacity="0.4"/>
</g>

<g>
  <circle cx="280" cy="276" r="5" fill="#C9C2B4"/>
  <text x="252" y="300" font-family="IBM Plex Mono, monospace" font-size="12" fill="#C9C2B4">Groot Brak</text>
</g>

<g>
  <circle cx="370" cy="280" r="5" fill="#C9C2B4"/>
  <text x="340" y="304" font-family="IBM Plex Mono, monospace" font-size="12" fill="#C9C2B4">Klein Brak</text>
</g>

<g>
  <circle cx="600" cy="195" r="7" fill="#B5472B"/>
  <circle cx="600" cy="195" r="14" fill="none" stroke="#B5472B" stroke-width="0.5" opacity="0.5"/>
  <text x="546" y="178" font-family="IBM Plex Mono, monospace" font-size="13" fill="#F2EFE9">George</text>
</g>

<text x="60" y="60" font-family="IBM Plex Mono, monospace" font-size="12" fill="#8A7A66" letter-spacing="1">GARDEN ROUTE CORRIDOR</text>
<text x="60" y="78" font-family="IBM Plex Mono, monospace" font-size="11" fill="#54635F" letter-spacing="0.5">APPROX. 65KM SERVICE RADIUS</text>
</svg>
