<svg width="100%" height="100%" viewBox="0 0 680 510" xmlns="http://www.w3.org/2000/svg" role="img" preserveAspectRatio="xMidYMid slice">
<title>Diamond pad polishing a stone surface</title>
<desc>Line illustration of a rotary polishing pad working a stone floor surface, with motion arcs showing the polishing pass, rendered in the Novello Stone brand palette.</desc>
<rect width="680" height="510" fill="#1C1B19"/>
<rect x="60" y="80" width="560" height="320" fill="#2A2825" stroke="#C9C2B4" stroke-width="0.5"/>
<g stroke="#C9C2B4" stroke-width="0.4" opacity="0.15">
  <line x1="60" y1="160" x2="620" y2="160"/>
  <line x1="60" y1="240" x2="620" y2="240"/>
  <line x1="60" y1="320" x2="620" y2="320"/>
  <line x1="200" y1="80" x2="200" y2="400"/>
  <line x1="340" y1="80" x2="340" y2="400"/>
  <line x1="480" y1="80" x2="480" y2="400"/>
</g>
<g opacity="0.9">
  <ellipse cx="340" cy="240" rx="150" ry="70" fill="none" stroke="#B5472B" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
  <ellipse cx="340" cy="240" rx="100" ry="46" fill="none" stroke="#B5472B" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.7"/>
</g>
<g transform="translate(340,240)">
  <circle r="46" fill="#8A7A66" opacity="0.9" stroke="#C9C2B4" stroke-width="0.5"/>
  <circle r="46" fill="none" stroke="#1C1B19" stroke-width="0.5" stroke-dasharray="2 6" opacity="0.5"/>
  <circle r="30" fill="#54635F" opacity="0.6"/>
  <circle r="10" fill="#1C1B19"/>
  <rect x="-7" y="-130" width="14" height="86" fill="none" stroke="#C9C2B4" stroke-width="1"/>
  <line x1="0" y1="-44" x2="0" y2="-2" stroke="#C9C2B4" stroke-width="1"/>
</g>
<path d="M 230 300 Q 340 320 450 300" fill="none" stroke="#B5472B" stroke-width="1" opacity="0.6"/>
<path d="M 230 180 Q 340 160 450 180" fill="none" stroke="#B5472B" stroke-width="1" opacity="0.6"/>
<text x="60" y="450" font-family="IBM Plex Mono, monospace" font-size="12" fill="#8A7A66" letter-spacing="1">DIAMOND PAD — POLISHING PASS</text>
<text x="60" y="468" font-family="IBM Plex Mono, monospace" font-size="11" fill="#54635F" letter-spacing="0.5">RESTORATION / 3000 GRIT</text>
</svg>
